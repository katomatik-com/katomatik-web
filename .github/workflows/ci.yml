name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # .nvmrc, not package.json — `engines` is a floor (">=24"), which
          # setup-node would satisfy with any newer major, including non-LTS.
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

      # Build here too — link checking needs the rendered HTML, and the image
      # job's build happens inside Docker where we can't reach the output.
      - run: npm run build

      # Internal links only. --offline skips network entirely, so someone
      # else's dead blog post can never block a deploy.
      # --root-dir, not --base: root-relative links in local files need an
      # absolute directory; --base only accepts a full URL.
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --root-dir ${{ github.workspace }}/dist
            --include-fragments
            'dist/**/*.html'
          fail: true

      # External links reported, never fatal.
      - name: Check external links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir ${{ github.workspace }}/dist
            'dist/**/*.html'
          fail: false
          output: lychee-external.md

  image:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # Only authenticate when we intend to push. Pull requests from forks
      # cannot access secrets, and shouldn't be publishing images anyway.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # SHA tags only — no `latest`. Kubernetes rollouts must reference an
          # immutable tag, otherwise "redeploy" means "whatever latest is now".
          tags: |
            type=sha,format=long
            type=sha,prefix=

      # The image build runs `npm run build`, which runs `astro check` first,
      # so a type error fails here. There is no separate typecheck step.
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarise
        if: github.event_name == 'push'
        run: |
          {
            echo "### Image pushed"
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
