server {
	listen 8080;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Emit relative redirects. Without this nginx builds absolute URLs from its
	# own listen port, so /blog redirects to http://host:8080/blog/ — an address
	# that doesn't exist for anyone coming through the Cloudflare Tunnel.
	absolute_redirect off;

	# Astro emits directory-style routes (/blog/post/index.html), so try the
	# path, then the directory, then 404. No SPA fallback — this is a static
	# site and a bad URL should 404, not silently render the homepage.
	location / {
		try_files $uri $uri/ $uri.html =404;
	}

	error_page 404 /404.html;
	location = /404.html {
		internal;
	}

	# Fingerprinted assets are safe to cache forever. Set Cache-Control once —
	# using `expires` as well emits a second, conflicting header.
	location /_astro/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	# HTML must revalidate, otherwise a deploy never reaches anyone who has
	# already visited.
	location ~* \.html$ {
		add_header Cache-Control "no-cache";
	}

	gzip on;
	gzip_types text/plain text/css application/javascript application/json image/svg+xml;
	gzip_min_length 1024;
}
